<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Printer Viewer</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    font-family: Arial, sans-serif;
    color: white;
}

.section {
    padding: 20px;
}

iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
    border-radius: 10px;
}

.mainsail-card {
    background: #1e1e1e;
    border-radius: 8px;
    margin: 20px;
    padding: 15px;
}

.visualizer-container {
    background: #111;
    height: 450px;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

button {
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    background: #1976d2;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1565c0;
}
</style>
</head>

<body>

<!-- CAMERA -->
<div class="section">

    <h2>3D Printer Cam - Creality K2 Plus</h2>

    <iframe src="http://10.0.0.73:4408/camera.html"></iframe>

</div>

<!-- GCODE VIEWER -->
<div class="mainsail-card">

    <h3>Gcode Preview</h3>

    <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
        <input type="number" id="layer-num" value="1" min="1">
        <button id="render-btn">Generate</button>
    </div>

    <div id="svg-render-container" class="visualizer-container">
        Select file or load printer G-code...
    </div>

</div>

<script>
const PRINTER_IP = "10.0.0.73";
const PORT = "4408";

function convertGCodeToSvg(text) {

    let x=0, y=0;
    let paths = "";

    const lines = text.split("\n");

    for (let l of lines) {

        if (!l.startsWith("G1") && !l.startsWith("G0")) continue;

        let nx=x, ny=y;

        const xMatch = l.match(/X([\d.]+)/);
        const yMatch = l.match(/Y([\d.]+)/);

        if (xMatch) nx = parseFloat(xMatch[1]);
        if (yMatch) ny = parseFloat(yMatch[1]);

        paths += `<path d="M ${x} ${y} L ${nx} ${ny}" stroke="#00ffff" stroke-width="0.3" fill="none"/>`;

        x=nx; y=ny;
    }

    return `<svg viewBox="0 0 200 200">${paths}</svg>`;
}

document.getElementById("render-btn").onclick = async () => {

    const container = document.getElementById("svg-render-container");

    try {

        const stats = await fetch(`http://${PRINTER_IP}:${PORT}/printer/objects/query?print_stats`)
            .then(r => r.json());

        const file = stats.result.status.print_stats.filename;

        const gcode = await fetch(
            `http://${PRINTER_IP}:${PORT}/server/files/gcodes/${encodeURIComponent(file)}`
        ).then(r => r.text());

        container.innerHTML = convertGCodeToSvg(gcode);

    } catch (e) {
        console.log(e);
        container.innerHTML = "Failed to load printer data (check HTTP/CORS)";
    }
};

</script>

</body>
</html>
